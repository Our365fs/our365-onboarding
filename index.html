    {
      id: "new_agent_orientation",
      title: "New Agent Orientation",
      icon: "\uD83C\uDF93",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "Why This Career: The 5-Year Wealth Progression", content: "Year 1 is The Grind: 100% new sales, renewals vest at 0%. Year 2 is The Build: renewals kick in, partial vesting, effort still high. Year 3 is The Momentum: renewals grow, effort drops to moderate. Year 4 is The Shift: passive renewal income overtakes active income. Year 5 is The Legacy: financial freedom, fully vested, effort is maintenance only. Every policy you place today is a building block of income you will earn in Year 4 and 5 without writing a new application. This is why insurance is a career, not a job." },
        { title: "Your Path to Success: Training Program Overview", content: "Your training covers five areas: (1) Product Knowledge — Life, Health, and Annuity basics. (2) Sales Skills and Prospecting Techniques — scripts, objections, lead conversion. (3) Compliance and Ethics Training — TCPA, HIPAA, state regulations. (4) Agency CRM and Systems Proficiency — Lead Marketplace, pipeline, documents. (5) Agency CRM operations and commission tracking. The 30-day onboarding path is designed to get you to First-Time Right submission on your first application. Every section of this Training Center maps directly to one of these five areas." },
        { title: "Compensation and Commission Structure", content: "Commissions are earned on First-Year Premium (FYP). Life Insurance FYP is approximately 70%. Health renewal commissions run approximately 50%. Sample Life renewal commissions are 20%. Sample Health renewal commissions are 10%. Commission Tiers progress: Tier 1 Associate Agent (10-20% production goals), Tier 2 Producer Agent (20-30%), Tier 3 Senior Producer (30-40%), Tier 4 Elite Producer (50-70%). Note: All commission figures are illustrative examples. Your actual schedule is in your Independent Contractor Agreement." },
        { title: "The Loyalty and Legend Career Milestone Ladder", content: "The career ladder: START (onboarded agent) → SENIOR AGENT (volume requirement met, production tiers) → ELITE PRODUCER (higher volume, leadership track) → TEAM LEADER (managing a defined group) → AGENCY PARTNER (office-level override income) → THE LEGEND (top performance, tenure qualification, bonus pool access). Bonus definitions: VESTING means immediate ownership of your renewal commissions. LOYALTY BONUS is paid based on production tiers and tenure. OVERRIDE COMMISSIONS are management revenue from team production. THE LEGEND FUND is a top-tier bonus pool distribution for qualifying Legend agents." },
        { title: "Agent Recruiting and the Team Builder System", content: "The 6-step recruiting logic: (1) Lead Gen Recruiting — inbound agent sourcing via social, referrals, and the 365 system. (2) Interview Protocol — behavioral interview for compliance and integrity, skills assessment. (3) Agent Contracting — NPN generation, background check, carrier appointment. (4) Training and Onboarding — 30-day path to first-time-right submission. (5) Team Builder Overrides — passive income from team production, bonus tier based on organizational volume. (6) Legend Producer Path — defined performance milestones for promotion to Legend Agent status with activity metric requirements." },
        { title: "Your First 30 Days: The Onboarding Checklist", content: "Day 1: Complete Agent Application and Independent Contractor Agreement. Submit active license copies and E&O proof. Day 1-3: Complete agency orientation and handbook review. Set up email, CRM access, and portal credentials. Week 1: Begin carrier appointment and contracting process. Review product portfolio and rate sheets. Week 1-2: Shadow experienced agent on minimum 3 client calls. Week 2: Complete carrier-specific product training. Week 2-3: Begin accepting assigned leads and scheduling consultations. Week 3-4: Submit first application with supervisor review. Day 30: 30-day performance check-in with Agency Principal." }
      ]

    {
      id: "lead_marketplace_crm",
      title: "Lead Marketplace & CRM",
      icon: "\uD83C\uDFEA",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "Lead Types and Quality: Direct Mail, Digital, Aged", content: "Three lead types power your pipeline. DIRECT MAIL leads are high-intent — the client physically responded to a mailer, which signals genuine interest. These are your most valuable leads. DIGITAL/WEB leads are real-time — the client just searched online and submitted a form. Speed to contact is critical (within 5 minutes). AGED LEADS are scalable and value-based — they require mining. Previous contact attempts failed, but with the right opener and persistence, aged leads can convert. Never dismiss an aged lead without 6 documented contact attempts over 7 days." },
        { title: "The 3-6-3 Touch Rule", content: "Every lead gets a structured follow-up sequence. Week 1: 6 contact attempts (calls, texts, voicemails in rotation). The first call should happen within 5 minutes during business hours or within 30 minutes after hours. Use the Double Dial technique: call twice in quick succession — a second ring often signals a real person, not a spam call. Week 2: 3 additional contact attempts using a different angle each time. After 9 total attempts with no response, move to the Nurture stage — do not drop. Document every attempt in the CRM. Undocumented attempts did not happen from a compliance standpoint." },
        { title: "CRM Workflow and Lead Disposition", content: "Every lead must have a current status in the CRM at all times: NEW (just assigned, no contact), CONTACTED (spoke with client, next step scheduled), APPOINTMENT SET (confirmed time on calendar), QUOTED (rates presented), SOLD (application submitted), NOT INTERESTED (confirmed declination), NURTURE (long-term follow-up, 30-90 day window), UNABLE TO REACH (9 attempts, no response). Any lead without a status update for 24 hours may be reassigned. Agency-generated leads are agency property — if you leave, they return to the pool. Self-generated leads are yours permanently." },
        { title: "Medical Pre-Qualifying and MIB", content: "Before presenting any life product, always pre-qualify medically. Ask about MEDICATIONS first, not conditions. Example: 'What medications are you currently taking?' This is legally cleaner and often reveals conditions indirectly. Then ask: 'Have you had any major health events in the last 2 years?' Always check the Medical Information Bureau (MIB) before submitting. MIB checking is mandatory — it catches prior application history across all carriers. An application submitted without pre-qualification that later gets declined wastes your time, the client's trust, and can trigger a chargeback. Never skip the MIB check." },
        { title: "The Lead Marketplace System and Grade Access", content: "Lead grades reflect quality and cost. Grade A ($40-$55): premium leads, Agency Builder and LEGEND tier only. Grade B ($25-$39): qualified leads, Senior Agent and above. Grade C ($10-$24): standard leads, Senior Agent and above. Grade D (under $10): training leads, all agents. Leads must be worked for 7 days minimum before dropping. If you drop a lead, provide a reason (No Answer, Wrong Number, Not Interested, etc.) — it returns to the pool for your tier for 7 days. Grade access is based on your monthly production tier, which resets monthly. The Lead Marketplace is a privilege — bad actors who claim and ignore leads lose marketplace access." }
      ]
    },
    {
      id: "war_room",
      title: "Monday War Room",
      icon: "\uD83C\uDFAF",
      level: "All Agents",
      videoPlaceholder: true,
      lessons: [
        { title: "War Room Structure: The 45-Minute Operating System", videoPlaceholder: true, content: "Monday War Room runs exactly 45 minutes every week. This is non-negotiable — discipline in the structure creates discipline in production. Agenda: 5 min Opening Scoreboard (last week's numbers, who hit targets, who missed and why), 10 min CEO Masterclass (leadership principle of the week), 8 min War Room Strategy (weekly focus theme), 10 min Telesales Script Drill (live practice with feedback), 5 min In-Person Script Drill, 7 min Recruiting and Onboarding Review. Every agent comes prepared with their weekly numbers. Every manager comes prepared with feedback. This is not a team meeting — it is a training session with scorekeeping." },
        { title: "Battle Card 01: The Revenue Factory — Daily Operating System", videoPlaceholder: true, content: "The Revenue Factory is your daily production system. THE FUNNEL: 30 New Lead Dials daily → 33% conversion → 10 Direct Conversations → 33% conversion → 3 Set Appointments → 33% conversion → 1 Completed Presentation. THE WEEKLY QUOTA: 15 presentations per week × 5 closed apps (33% closing ratio) × $100 average monthly premium = $4,500 total weekly advance (approximate). THE GROWTH FORMULA: Consistent Activity + Standardized Leads = Predictable Income. SELF-CORRECTION RULE: If your closing ratio drops below 30%, immediately return to the Fact-Finding module for a skills refresh. Numbers do not lie — when production drops, activity always dropped first." },
        { title: "Week 1 Focus: Winning the First 30 Seconds", videoPlaceholder: true, content: "Weekly Leadership Focus: Top producers use the first 30 seconds to establish trust, not to pitch. Leadership principle: Confidence is a discipline, not a feeling. Script drill: Opener and qualification in under 60 seconds. Practice opener: 'Hi [Name], this is [Your Name] with Our 365 Financial Solution. I am following up because you recently requested information about coverage options — I want to make sure you get exactly what you are looking for. Do you have about 3 minutes?' Objection drill: 'I am not interested.' Response: 'I understand. A lot of people say that at first because they do not want to waste time unless there is actually something worth looking at. All I need is 2 minutes.' Recruiting action: Send 15 outreach messages to licensed agents." },
        { title: "Week 2 Focus: Objection Mastery", videoPlaceholder: true, content: "Weekly Leadership Focus: Own every objection before it owns you. Leadership principle: Resistance is information — it tells you what question the client has not asked yet. Script drill: Run through all four objection categories (price, time, trust, authority) with live responses. KPI focus: Contact rate and objection recovery rate. Objection drill: 'I need to think about it.' Response: 'Absolutely. What specifically would you want to think about? [Listen.] The reason I ask is that most people who say that have a question they have not asked yet. What is on your mind?' Scorecard review: Every agent reports their objection recovery percentage. Target: recover 50% of initial objections into a next step. Recruiting action: Follow up with all pending pipeline recruits." },
        { title: "Week 3 Focus: Pipeline and Conversion", videoPlaceholder: true, content: "Weekly Leadership Focus: Every lead in your pipeline is money on a table — go pick it up. Leadership principle: Your pipeline is your paycheck. Activity review: Dials, contacts, quotes submitted, applications, placed policies. Script drill: Presentation transition and close language. Objection drill: 'I already have coverage.' Response: 'That is great — it means you already understand the importance of being protected. My job is just to make sure what you have is still the best option. Rates and plans change every year. Would you be open to a quick 10-minute comparison? If what you have is already best, I will tell you that.' Pipeline rule: Any lead stuck at New Lead for 7+ days gets a flag and a required action plan. Recruiting action: Post one recruiting message on LinkedIn and Facebook." },
        { title: "Week 4 Focus: Recruiting and Team Growth", videoPlaceholder: true, content: "Weekly Leadership Focus: Build the team that builds the agency. Leadership principle: Every great agent was once a new agent who was given a chance. Recruiting review: Current pipeline, pending applications, upcoming onboarding. Who is close to a tier promotion? What do they need? Script drill: Recruiting opener for LinkedIn and phone outreach. Weekly KPI targets: Dial Target (minimum 30 dials/day), Appointment Target (minimum 3 set/day), Follow-Up Target (all 5-day-old leads contacted), Recruiting Target (10 outreach messages), Personal Improvement Target (one script practiced daily). These are the floor, not the ceiling. Recruiting action: Send 20 outreach messages. Identify one person to fast-track to Senior Agent this month." }
      ]
    },
    {
      id: "telesales_mastery",
      title: "Telesales Mastery",
      icon: "\uD83D\uDCDE",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "Anatomy of the Opener: The First 10 Seconds", content: "Three elements define your opener. TONE: Confident and clear — not loud, not tentative. The client decides in the first 3 seconds whether to keep listening based on your tone alone. PACE: Measured, avoiding speed-talking. Nervous agents speak too fast. Slow down by 20% from your natural pace — you will still feel slow but sound professional. PATTERN INTERRUPT: Start with the problem, not the pitch. Instead of 'Hi I am calling about insurance,' open with 'Hi, I am following up because you were looking for options to protect your family...' This disrupts the client's spam-call filter and creates a moment of relevance. Record yourself daily and listen back — your ear will catch what your mouth misses." },
        { title: "The Tie-Down Technique: Building Yes Momentum", content: "The Tie-Down Technique uses small yes questions to build commitment before the close. Examples: 'That makes sense, right?' 'Would that be important to your family?' 'I imagine you would want to make sure that is covered, correct?' Each yes is a micro-commitment that makes the final yes easier. Good dial-to-appointment benchmark: 10:1 — every 10 qualified dials should yield 1 appointment. Appt Set-to-Held benchmark: 6:1 — for every 6 appointments set, 1 should be completed. Track these numbers weekly. If your dial-to-appt ratio is worse than 10:1, your opener needs work. If your set-to-held ratio is worse than 6:1, your confirmation process needs work. The numbers always tell you where to focus." },
        { title: "Conversion Metrics: Your Daily Numbers", content: "The Revenue Factory targets: 30 dials/day → 10 direct conversations (33% contact rate) → 3 set appointments (33% conversion) → 1 completed presentation (33% show rate). Weekly output: 15 presentations → 5 closed applications (33% closing ratio) → $100 average monthly premium → approximately $4,500 weekly advance. If any conversion rate falls below 30%, diagnose at that stage. Contact rate below 30% = wrong dial times or bad lead source. Appt conversion below 30% = opener or tie-down needs work. Show rate below 30% = confirmation process broken. Closing ratio below 30% = return to fact-finding and presentation training immediately." },
        { title: "The Rebuttal Engine: Feel, Felt, Found", content: "The Feel, Felt, Found method is the foundational rebuttal framework. When a client objects, respond: 'I understand how you FEEL. Many of my clients FELT the same way at first. What they FOUND was...' This validates the objection, creates social proof, and pivots to a resolution. Example for price: 'I understand how you feel about the cost. Many of my clients felt the same way initially. What they found was that the cost of not having coverage was actually much higher when something happened.' The Rebuttal Engine also tracks your Appt Set-to-Held ratio (benchmark 6:1). If clients are not showing for appointments, your confirmation scripts need a refresh. After every objection, document what you said and whether it worked — build your personal rebuttal bank." },
        { title: "Critical Phone Behaviors", content: "Double Dial: Call once, if no answer, call immediately again. A second ring often triggers a real person to answer — they assume it is urgent. If no answer on second call, leave one voicemail per 2 dials maximum. Voicemail rule: 'Hi [Name], this is [Your Name] with Our 365 Financial Solution. I have some information about the coverage options you were looking into. Please call me back at [number] — I will be available until [time].' Never leave more than one voicemail per session. Never sound rushed or scripted in a voicemail. Text follow-up: Send a text within 15 minutes of a voicemail — many people read texts when they will not return calls. Keep it under 160 characters." },
        { title: "Confidence Reps: Building the Habit of Excellence", content: "Run daily confidence reps — record your opener 5 times each morning before your first call. Listen back. Ask: Am I smiling? Is my pace steady? Do I sound like someone a stranger would trust? The goal is consistency — call 1 and call 50 should sound identical. Confidence is a physical state, not a mindset. Before every call session: stand up, take 3 deep breaths, and say your opener out loud once before dialing. Use the Scoreboard to track not just results but effort — 30 dials with 0 contacts is a good day if you executed the process correctly. Every agent has bad contact days. No agent should have a bad effort day. The compound effect of 30 dials every working day is 600+ dials/month — at a 33% contact rate that is 200 conversations." }
      ]
    },
    {
      id: "score_card",
      title: "Our 365 Score Card",
      icon: "\uD83D\uDCCA",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "The Four Objection Categories", content: "Every objection falls into one of four categories. PRICE: 'I cannot afford it' or 'That is too expensive.' The real question is value — they do not yet understand why the coverage is worth the cost. TIME: 'I need to think about it' or 'Call me back next week.' The real question is usually one they have not asked yet. Find it. TRUST: 'I do not know your company' or 'I have never heard of this carrier.' Social proof and carrier ratings resolve this. AUTHORITY: 'I need to talk to my spouse' or 'I have to check with my financial advisor.' Either include them immediately or set a specific callback when they are present. Identifying the category before responding is the difference between a trained agent and a reactive one." },
        { title: "Price Objection: The Value Reframe", content: "When clients say 'I cannot afford it,' they are actually saying 'I do not see the value yet.' Response framework: 'I understand — most people I talk to feel the same way at first. The question I always ask is: can you afford not to have it? Let me show you what happens to a family without coverage when something goes wrong.' Then bring it back to their specific situation — their family, their mortgage, their children. Never defend the price. Reframe around the cost of being uninsured. The Budget Binder rule: if the premium is under 10% of their monthly discretionary income, affordability is a perception problem, not a math problem. Work on the perception." },
        { title: "Time Objection: Surfacing the Real Question", content: "When clients say 'I need to think about it,' respond: 'Absolutely — this is an important decision. Can I ask what specifically you would want to think about? [Wait for answer.] The reason I ask is that most people who say that have a specific question they have not asked yet. What is on your mind?' This surfaces the real objection 90% of the time. If they genuinely need time: 'I completely respect that. When would be a good time to reconnect — would [day] at [time] work? Let me put that in my calendar now.' Always leave with a specific next step and a date. 'I will call you in a few days' is not a next step — it is a goodbye." },
        { title: "Control and Redirect", content: "When you lose control of the call, use a pattern interrupt to reset: 'I want to make sure I am actually helping you — let me ask one quick question.' This reframes the conversation and returns you to the driver's seat. If the client hangs up, mark the lead Nurture, not Lost. Call back in 48 hours with a fresh opener: 'Hi [Name], I just wanted to make sure I gave you everything you needed from our last conversation.' Never chase a lost call more than once per day. The Rebuttal Engine rule: after every objection, redirect toward a specific next step. An objection without a next step is a lost opportunity, not a lost sale." },
        { title: "Urgency Creation: Ethical and Effective", content: "Ethical urgency is rooted in the client's situation, not your quota. Legitimate urgency triggers: 'Open enrollment closes on [date] — after that you cannot change plans until next year.' 'Your rate is calculated based on your age today — every birthday your premium goes up.' 'I can submit this application today and lock in your rate. If we wait, I cannot guarantee the same quote.' Health-based urgency: 'You qualify at this rate right now based on your current health. Health can change — this window may not always be open.' Never fabricate urgency. Clients who feel manipulated do not refer. Clients who feel informed and protected refer everyone they know." }
      ]
    },
    {
      id: "appointment_setting",
      title: "Appointment Setting",
      icon: "\uD83D\uDCC5",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "Calendar Control: Own the Schedule", content: "Never ask 'When works for you?' — that hands control to the client and usually results in 'I will call you back.' Instead, offer two specific options: 'I have Tuesday at 10am or Wednesday at 2pm — which works better?' This creates a choice between yes and yes, not yes and no. Once they pick: confirm it verbally on the call, then send a text within 15 minutes: 'Confirmed: [Day] at [Time] — [Your Name] with Our 365 Financial Solution. Looking forward to it.' Two-touch confirmation reduces no-shows by 40%. If neither option works, offer two more. Never leave a call without a specific appointment booked or a specific callback time." },
        { title: "Handling Booking Resistance", content: "'I am too busy right now' — Response: 'Completely understand. That is exactly why I only need 15 minutes. This is not a long presentation — I just want to make sure you have the right information before you make any decisions. Is there a 15-minute window this week or next?' Shrink the ask. 15 minutes always sounds better than a meeting or a consultation. If they say they are busy for the next two weeks: 'No problem — would [date 2 weeks out] at [time] work? Let me lock that in now so it does not fall through the cracks.' Always make it easy to say yes. The harder it is to say yes, the more likely they will say nothing at all." },
        { title: "Lead-In Language: The Micro-Commitment", content: "Before asking for the appointment, build a micro-commitment with logic. 'Based on what you told me, I think I can find you better coverage at the same price or better — or at minimum show you options you did not know existed. Would it be worth 15 minutes to find out for sure?' They say yes to the logic before they say yes to the time. This doubles appointment conversion rates compared to asking cold. The three pillars of the micro-commitment: (1) Show them what you found for them specifically. (2) Frame it as information, not a sales call. (3) Make the time commitment as small as possible. Start with 15 minutes — you can always go longer once you are in the conversation." },
        { title: "Follow-Up Discipline: The Rule of 5", content: "Every prospect gets 5 touchpoints before moving to cold: (1) Initial call + voicemail. (2) Text follow-up within 2 hours. (3) Email with value content within 24 hours. (4) Second call with new angle (urgency or new information). (5) Final call: 'I have been trying to reach you and want to make sure I did not miss anything important — this is my last call before I close your file.' Space touchpoints 24-48 hours apart. Use a different angle each time — first call is introduction, second is value, third is urgency, fourth is social proof, fifth is final attempt. After 5 touches, move to Nurture — ping once per month with something of value." },
        { title: "Confirmation and No-Show Prevention", content: "Three-step confirmation process: (1) Confirm on the call in real time: 'Great, I have you down for [Day] at [Time]. I will send you a text now with my information.' (2) Text within 1 hour of booking: 'Looking forward to speaking [Day] at [Time] — [Your Name], Our 365 Financial Solution. ([Number])' (3) Morning-of reminder: 'Good morning [Name], just a reminder about our [Time] appointment today. See you then!' If they cancel, re-book immediately before ending the call: 'No problem at all — what works better, [Option A] or [Option B]?' Never let them off the phone without a new date. A cancelled appointment is not a lost client — it is a timing issue." }
      ]

    {
      id: "in_home_closing",
      title: "In-Home Closing",
      icon: "\uD83C\uDFE0",
      level: "Senior Agent+",
      videoPlaceholder: false,
      lessons: [
        { title: "Set the Tone Before You Sit Down", content: "In-home sales begin before you enter the house. Park across the street, not in front — this is a professional call, not a social visit. Dress one level above what they would wear. Bring a physical folder — it signals preparation and builds credibility before you speak. Open with: 'Before we start, I want you to know — I am not here to sell you anything. I am here to make sure you have the right information to make the best decision for your family. My job is just to show you what is available.' This disarms the sales-resistance defense that most clients activate when a salesperson walks in. Slow is smooth and smooth is fast — take your time setting up." },
        { title: "The Why Discovery: Uncovering the Emotional Trigger", content: "The Why Discovery uncovers the emotional reason behind the need for coverage — moving the client from what they want to what they need. Core questions: 'What made you decide to look into this now?' 'When you think about what would happen to your family if something happened to you tomorrow, what concerns you most?' 'Have you had any personal experience with someone who did not have coverage when they needed it?' Listen without interrupting. The moment they identify their emotional trigger is the moment the product stops being a sale and becomes a solution. Define the moment they decided to make a change — that is the pivot point of your entire presentation." },
        { title: "The Budget Binder: The 10% Rule", content: "The Budget Binder is a definition of how much a client should invest in protection. The guideline: 10% of monthly discretionary income. Discretionary income = take-home pay minus fixed expenses (rent, car, utilities, food). Example: client takes home $3,000/month, fixed expenses $2,000, discretionary $1,000 — 10% Budget Binder = $100/month. Use this as an anchor: 'Most of my clients find that protecting their family costs about 10% of their flexible monthly income — in your case that would be around $X. Does that range feel workable?' This frames the budget before you present any premium, which eliminates most price objections before they arise." },
        { title: "The Beneficiary Conversation: Pivot to People", content: "The Beneficiary Conversation pivots from numbers to emotional reality. After presenting the coverage amount: 'Now, who would receive this benefit?' When they name someone — a spouse, a child, a parent — ask: 'What does [name] mean to you?' Then: 'So this policy is really a letter to [name] that says: even if I am not here, I made sure you were taken care of. That is what this coverage does.' The death benefit is not a financial product at this point — it is a love letter. This language connects the abstract (premium dollars) to the concrete (protecting someone they love). It is the most powerful pivot in the entire sales process. Practice it until it feels natural — not scripted." },
        { title: "The 3-Option Method: Good-Better-Best", content: "Never present one plan — present three (Bronze, Silver, Gold). This creates a choice between three yeses instead of a yes or no decision. Structure: Bronze = minimum adequate coverage at lowest premium. Silver = recommended coverage with key riders included. Gold = full coverage with all riders and maximum benefit. Present Silver first: 'This is what I would recommend for your situation.' Then show Bronze as the floor: 'This is the minimum that would cover your core needs.' Then Gold as the ceiling: 'And if we want full coverage with every option, this is what that looks like.' Most clients choose Silver. The 3-option method also eliminates buyer's remorse — they made an active choice, not a passive one." },
        { title: "The Assumptive Close: Transition to the Application", content: "The Assumptive Close transitions naturally from presentation to application without asking for a decision. After presenting, instead of 'Would you like to go ahead?' say: 'Does this make sense for your family?' When they say yes, move directly: 'Great — let me get the paperwork started. I just need a few pieces of information from you.' If they hesitate: 'What would need to be different for this to work for you?' This surfaces the remaining objection without triggering a defensive response. The Assumptive Close is built on three pillars: Living Benefits (what the policy does while alive), Death Benefit (what it does after), and Premium Stability (the payment never changes). Lead with people, not products." },
        { title: "Three Pillars of Value: What You Are Really Selling", content: "The Three Pillars frame value beyond cost. PILLAR 1 — Living Benefits: Most permanent life policies include Accelerated Death Benefit riders for terminal, critical, and chronic illness. Your client can access part of their death benefit while still alive if they are diagnosed with a qualifying condition. This is not a death product — it is a living protection product. PILLAR 2 — Death Benefit: The contractual guarantee that the family is protected financially regardless of when death occurs. PILLAR 3 — Premium Stability: Once the policy is issued, the premium never increases. Fixed for life. In a world where everything goes up — rent, food, gas — this is remarkable. Frame all three pillars before any discussion of premium." },
        { title: "E-App Mastery: Securing the Application", content: "Electronic application steps: (1) Confirm the client's legal name, date of birth, and Social Security number exactly as they appear on their ID. (2) Complete the health questionnaire based on your pre-qualification conversation — no surprises. (3) Signature types: Voice Signature (recorded verbal consent, requires compliance disclosure), Email/Text Link (OTP code sent to client, they click to sign), Face-to-Face/Click-to-Sign (in-person digital signature). (4) Real-time data transmission: The E-App syncs with carrier underwriting systems and runs MIB and Rx checks simultaneously. (5) NIGO Prevention: Check all mandatory fields before submission. One missing signature or unchecked disclosure triggers a Not In Good Order rejection — track status via carrier portal until issued." }
      ]
    },
    {
      id: "scripts_objections",
      title: "Scripts & Objections",
      icon: "\uD83D\uDCAC",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "First Call Script Blueprint: Introduction and Opening", content: "Open with confidence: 'Hello [Client Name], this is [Agent Name] with Our 365 Financial Solution. I am calling about the final expense information you requested.' Opening principles: (1) Open with acknowledgment of their request — they raised their hand first. (2) Use the agency name fully in every first call. (3) Scripted notation — define Final Expense here before moving forward. If they seem confused about what they requested: 'You submitted your information recently about coverage options for final expenses — funeral costs, medical bills, that kind of protection.' Do not apologize for calling. You are following up on their request, not making an unsolicited call. Confidence in your opener is the single most important factor in whether the call continues." },
        { title: "Value Proposition and Benefit Statement", content: "The Value Proposition bridge: 'The options I have cover funeral costs or income protection, ensuring your family receives a tax-free payment. What caught your eye about this program?' This does three things: (1) States the benefit clearly in one sentence. (2) Uses the word tax-free — almost no one knows life insurance death benefits are tax-free to the beneficiary, and it always creates engagement. (3) Ends with a discovery question that gives the client the floor — you stop selling and start listening. The benefit statement should be one sentence, one benefit, one question. Never list multiple benefits in the opening statement — it overwhelms and sounds like a pitch rather than a conversation." },
        { title: "Objection Response Table", content: "CLIENT SAYS: 'Not interested.' RESPONSE 1: 'I understand. Most people I speak with were not looking for this but were curious about better options. All I need is 2 minutes — if it does not apply, I will let you go immediately.' RESPONSE 2: 'Can I ask — do you currently have coverage in place for final expenses? [If no:] Then I may actually have something important for you.' CLIENT SAYS: 'Already have insurance.' RESPONSE: 'That is great. My job is not to replace what you have — it is to make sure what you have is still the best option. Would you be open to a quick 10-minute comparison? If yours is better, I will tell you that.' These are not scripts to memorize word-for-word. They are frameworks to internalize until they become natural." },
        { title: "Closing to Appointment", content: "After presenting value and handling initial objections, close to an appointment: 'I want to make sure I can show you exactly what is available in your area and what you qualify for. I have some time this week — would [Day] at [Time] work, or is [Day] at [Time] better for you?' This is a soft close that moves from a phone conversation to a scheduled next step. If they resist scheduling: 'I completely understand. Let me send you some information and follow up in a day or two — would that be okay?' Always get permission for the next contact. Blueprint definitions for reference: FINAL EXPENSE = Permanent Whole Life for final needs. TERM LIFE = Temporary coverage for a defined period. OBJECTION = Client hesitation to be acknowledged and resolved. APPOINTMENT = Set time for comprehensive review." },
        { title: "Opening a Medicare Call", content: "Medicare compliance disclosure — read verbatim before discussion: 'This call may be recorded for quality and compliance purposes as required by Medicare. By continuing, you consent to being recorded. This is not a government agency. Our 365 Financial Solution is a licensed insurance agency. We do not offer every plan available in your area — contact Medicare.gov or 1-800-MEDICARE for all options.' Wait for verbal yes before continuing. Then: 'I understand you were looking for information about Medicare coverage options. I would love to help you find the best option for your situation. Do you have a few minutes?' Always use the Medicare Call Recorder in this portal before any Medicare discussion. CMS requires 10-year retention of all recorded Medicare sales calls." },
        { title: "Opening a Life Insurance Call", content: "'Hi [Name], this is [Name] with Our 365 Financial Solution. I am reaching out because you recently requested information about life insurance coverage. I want to make sure you have exactly what you need to protect your family. Do you have about 3 minutes?' If they say yes: 'Perfect — before I share anything, I want to ask a couple of quick questions so I am not wasting your time with something that does not apply to you.' Then move into qualification: (1) 'Are you currently covered with anything?' (2) 'What is your primary goal — income replacement, mortgage protection, final expenses, or building cash value?' (3) 'Are there any health conditions I should know about before I run quotes?' These three questions tell you the product, the amount, and whether they qualify." }
      ]
    },
    {
      id: "medicare_basics",
      title: "Medicare Basics",
      icon: "\uD83E\uDE7A",
      level: "Health Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "What Is Medicare? The Four Parts Defined", content: "Medicare is the federal health insurance program for people 65 and older, certain younger people with disabilities, and people with End-Stage Renal Disease. It has four parts. PART A: Hospital insurance covering inpatient stays, skilled nursing, hospice, and some home health care. PART B: Medical insurance covering outpatient services, doctor visits, preventive care, and medical equipment. PART C (Medicare Advantage): Private plan alternative to Original Medicare that bundles Part A, B, and often Part D. PART D: Prescription drug coverage available through private plans approved by Medicare. Understanding which parts your client has — and what gaps exist — is the starting point of every Medicare conversation." },
        { title: "Plan G vs Plan N: Medigap Comparison", content: "Medicare Supplement (Medigap) plans fill the gaps left by Original Medicare. PLAN G covers all Medicare-approved costs except the Part B deductible ($240 in 2024). It is the most comprehensive plan available after Plan F was discontinued for new enrollees. PLAN N covers the same as Plan G but requires copays up to $20 for office visits and $50 for ER visits (waived if admitted). Plan N typically has lower premiums than Plan G. Plan G is most popular for clients who want comprehensive coverage with no surprise copays. Plan N works well for healthier clients who rarely see specialists. Always run a comparison using SunFire Matrix before recommending." },
        { title: "Enrollment Periods: When Clients Can Act", content: "INITIAL ENROLLMENT PERIOD (IEP): 7-month window — 3 months before, the month of, and 3 months after the client's 65th birthday. This is the most important window — guaranteed issue rights apply. ANNUAL ENROLLMENT PERIOD (AEP): October 15 through December 7 each year — clients can change Medicare Advantage or Part D plans. Changes take effect January 1. SPECIAL ENROLLMENT PERIOD (SEP): Triggered by qualifying life events such as losing employer coverage, moving out of a plan's service area, or losing Medicaid eligibility. T-65 clients (turning 65) are your highest-value Medicare leads — they are actively shopping, highly motivated, and have guaranteed issue rights meaning no underwriting denial." },
        { title: "Scope of Appointment: A Mandatory Compliance Step", content: "A Scope of Appointment (SOA) form must be completed BEFORE any Medicare Advantage or Part D meeting. The SOA documents exactly which types of plans the client agreed to discuss. Required at least 48 hours before the appointment with limited exceptions for walk-in requests. During the meeting, you may ONLY discuss plan types listed on the SOA. If a client wants to discuss something not on the SOA, you must stop, add it, and document the addition. Keep all SOAs on file — CMS conducts audits and can request records. An SOA discussion without a signed form on file is a compliance violation that can result in a civil monetary penalty. Use the portal SOA documentation tool for every Medicare appointment." },
        { title: "Medicare Products Overview: Supplement vs Advantage", content: "Two primary Medicare tracks: MEDICARE SUPPLEMENT (Medigap): Works alongside Original Medicare. Client keeps their Medicare card and uses it everywhere Medicare is accepted. The Supplement pays what Medicare does not. Plans are standardized by letter (G, N, etc.) so the same letter plan from any carrier offers identical benefits — price and carrier reputation are the differentiators. MEDICARE ADVANTAGE (MAPD): Replaces Original Medicare with an all-in-one private plan. Often $0 premium but may have copays, deductibles, and network restrictions. Best for clients who want low premium and are comfortable with networks. PART D (PDP): Standalone prescription drug plan — used with Original Medicare or Medigap. Always run a Part D comparison for clients on Original Medicare." },
        { title: "CMS Call Recording: The Compliance Non-Negotiable", content: "Per 42 CFR 422.2274 and 423.2274, ALL Medicare sales and marketing calls must be recorded and retained for 10 years. This applies to every phone call where any Medicare plan is discussed — including comparisons, benefit explanations, and enrollment assistance. Required disclosure script — read verbatim before every Medicare call: 'This call is being recorded for quality and compliance purposes as required by CMS. By continuing this call, you consent to being recorded.' Wait for verbal consent before proceeding. Always use the Medicare Call Recorder built into this portal. CMS audits are real — agents who cannot produce recordings of sales calls face civil monetary penalties and license action. There are no exceptions." }
      ]
    },
    {
      id: "life_insurance_101",
      title: "Life Insurance 101",
      icon: "\uD83D\uDEE1\uFE0F",
      level: "Life Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "Product Selection Matrix: The Four Quadrants", content: "The Universal Product Selection Matrix: TERM LIFE — Target: Families and mortgage protection. Key benefit: High coverage, low cost. Best for clients who need maximum coverage for minimum premium for a defined period (10, 15, 20, 30 years). WHOLE LIFE — Target: Seniors, children, Final Expense. Key benefit: Permanent protection plus guaranteed cash value growth. Level premiums never increase. INDEXED UNIVERSAL LIFE (IUL) — Target: High earners, supplemental retirement. Key benefit: Cash accumulation linked to a market index with a 0% floor guarantee, plus death benefit. ANNUITIES — Target: Retirees, risk-averse clients. Key benefit: Guaranteed income and longevity protection. Matching the client to the right quadrant before quoting is the Product Solve Workflow." },
        { title: "Term Life Defined: Pure Death Benefit", content: "Term Life provides pure death benefit coverage for a fixed period. Key elements: PURE DEATH BENEFIT — pays the face amount if the insured dies during the term. No cash value accumulation. LEVEL PREMIUMS — fixed and level for the entire term. Never increases during the term period. CONVERSION PRIVILEGE — most term policies allow conversion to permanent life without a new medical exam before a specified date. MORTALITY RISK ASSESSMENT — carriers underwrite term based on age, health class, tobacco use, and family history. LIVING BENEFITS — many modern term policies include Accelerated Death Benefit (ADB) riders for terminal, critical, and chronic illness at no extra cost. Term is not a lesser product — it is the right tool for income replacement and mortgage protection during high-need years." },
        { title: "Mortgage Protection and Living Benefits", content: "MORTGAGE PROTECTION (MP) is a purpose-driven level or decreasing term solution designed specifically to pay off a mortgage balance. Direct connection to mortgage debt. Goal: if the insured dies, the mortgage is paid off and the family keeps the home. LEVEL TERM for MP: Premium and death benefit remain constant for the term. Client overpays early but has more benefit later. DECREASING TERM for MP: Death benefit decreases as the mortgage balance decreases, typically at a lower premium. LIVING BENEFITS DEFINED: Acceleration of death benefit for specific qualifying conditions. Terminal illness trigger: expected death within 12-24 months. Critical illness trigger: heart attack, stroke, cancer diagnosis. Chronic illness trigger: inability to perform 2 of 6 activities of daily living. These riders pay cash to a living recipient — the client does not need to die to use their policy." },
        { title: "Whole Life: The Anchor", content: "Whole Life is permanent protection guaranteed to age 121. Four defining characteristics: PERMANENT PROTECTION — death benefit guaranteed for the client's entire life as long as premiums are paid. LEVEL PREMIUMS — fixed for life, never increase. One of the most powerful guarantees in insurance. CASH VALUE ACCUMULATION — the living benefit of permanent insurance. Tax-deferred growth accessible via policy loans or withdrawals. DIVIDENDS — optional participation in company profits (for participating policies). Can be taken as cash, used to reduce premiums, or purchase paid-up additions to increase death benefit. GUARANTEES vs. DIVIDENDS: Guarantees are contractual (premium, death benefit, minimum cash value). Dividends are not guaranteed but many carriers have paid them consecutively for over 100 years. Mutual of Omaha, New York Life, and Gerber Life are key whole life carriers." },
        { title: "Final Expense: The Simplified Issue Deep-Dive", content: "Final Expense is a permanent simplified-issue whole life product designed to cover end-of-life costs. Key definitions: SIMPLIFIED UNDERWRITING — no medical exam, only health questions. Client answers a series of yes/no health questions. If all answers qualify, coverage is issued. GUARANTEED ISSUE — no health questions at all, cannot be declined. Higher premium, 2-year graded benefit (years 1-2 pay ROP + interest, full benefit from year 3). SMALL FACE VALUE — typically $2,000 to $35,000. Designed to cover funeral costs ($8,000-$15,000 average), final medical bills, and small debts. EXAMPLE CARRIERS: Americo (Final Expense), American Amicable (level and graded options), Mutual of Omaha (simplified issue), Gerber Life (guaranteed acceptance). Always run live quotes using FEX Quotes (widget ID 53689) in the Quote Builder." },
        { title: "IUL: The Indexing Engine Introduction", content: "Indexed Universal Life (IUL) combines permanent death benefit with cash value growth linked to a market index. THE INDEXING ENGINE: Cash value accumulation is linked to a stock market index (e.g., S&P 500) but is NOT a direct investment. You do not own index shares. FLOOR (0% Guarantee): If the index drops, your cash value credits 0% — you cannot lose principal due to market performance. CAP RATE: Maximum crediting rate. If the cap is 10% and the index grows 20%, you earn 10%. PARTICIPATION RATE: The percentage of index growth credited to the policy. LIVING BENEFITS (ABR): Accelerated Death Benefit riders for terminal, critical, and chronic illness — allows access to death benefit while living. Example carrier: Mutual of Omaha (IUL Express). Best for: high earners who have maxed out retirement accounts and want tax-advantaged supplemental growth." },
        { title: "Product Solve Workflow: Needs-Based Selling", content: "The Product Solve Workflow defines how to match client needs to the correct product. STEP 1 — Initial Inquiry: What brought the client to you? What is their primary concern (debt protection, income replacement, cash accumulation, final expenses)? STEP 2 — Risk Assessment: Health class, age, tobacco status, financial situation, family obligations. STEP 3 — Solution Path: Based on steps 1 and 2, identify the product quadrant (Term, Whole, IUL, Annuity). STEP 4 — Correct Product Selection: Run live quotes for the appropriate product. Present using the 3-Option Method (Good-Better-Best). Needs-based selling is not just ethical — it is regulatory. Many states require documentation showing why a product was recommended. Document your needs analysis in the CRM for every sale." },
        { title: "Riders: ADB, WP, and ROP Defined", content: "Policy riders are add-on provisions that modify or enhance base coverage. ACCELERATED DEATH BENEFIT (ADB): Allows early access to part of the death benefit if the insured is diagnosed with a qualifying terminal, critical, or chronic illness. Most carriers include this at no extra premium. WAIVER OF PREMIUM (WP): If the insured becomes totally disabled, premiums are waived and coverage continues. Disability must typically last 6 months or more. RETURN OF PREMIUM (ROP): If the insured outlives the term, all premiums paid are returned. Higher premium but guaranteed return of cost. RIDER CONTINUITY: Supplemental life products integrate multiple riders for enhanced protection — a WP rider ensures coverage stays in force during disability while ADB ensures living access during illness. Always review available riders before submitting — some must be added at policy issue and cannot be added later." },
        { title: "Health Classifications and Replacement Notices", content: "HEALTH CLASSIFICATIONS: PREFERRED PLUS — excellent health, non-smoker, ideal BMI, clean family history. PREFERRED — good health, minor history. STANDARD PLUS — some health issues, controlled. STANDARD — controlled chronic conditions. TABLE RATINGS (B, D, F, H) — significant health history, higher premiums applied as a percentage of standard. Always pre-qualify before quoting — running a quote for a client who will rate significantly wastes time and erodes trust when the real offer comes back higher. REPLACEMENT NOTICES: When replacing an existing life policy, complete a replacement notice (Form 1035 for tax-free exchange). NEVER encourage a client to lapse an existing policy before the new one is approved and in force. Document your reasoning for every replacement — why is this objectively in the client's best interest? Anti-churning regulations require this documentation." }
      ]
    },
    {
      id: "annuity_fundamentals",
      title: "Annuity Fundamentals",
      icon: "\uD83C\uDFE6",
      level: "Senior Agent+",
      videoPlaceholder: false,
      lessons: [
        { title: "IUL Deep-Dive: The Indexing Engine", content: "The IUL Indexing Engine in detail: FLEXIBLE PERMANENT PROTECTION — combines death benefit with cash value growth potential. INDEXING ENGINE — cash value growth linked to S&P 500 (not a direct investment). FLOOR GUARANTEE — cash value credited at minimum 0% even if index drops. You can never lose cash value due to market performance. CAP RATE — maximum crediting rate. Example: if cap is 10% and index grows 20%, you earn 10%. If index grows 8%, you earn 8%. PARTICIPATION RATE — the percentage of index growth credited. Example: 80% participation rate on 10% index growth = 8% credit. LIVING BENEFITS (ABR) — Accelerated Death Benefit riders for terminal, critical, and chronic conditions. KEY TERMS: Spread (fee deducted from index growth), Surrender Charges (early withdrawal penalties), Premium Flexibility (adjustable payment amounts within policy guidelines)." },
        { title: "Annuity Basics: The Retirement Income Engine", content: "An annuity is a contract with an insurance company designed for wealth accumulation and income distribution. ANNUITY DEFINED: A contract providing periodic payments — immediate or deferred. IMMEDIATE vs. DEFERRED: Immediate annuity begins income payments within 12 months of premium payment. Deferred annuity accumulates value first, distributions begin later. FIXED vs. INDEXED: Fixed annuity earns a guaranteed interest rate — no market exposure. Fixed Indexed Annuity (FIA) earns interest linked to a market index with principal protection. INCOME RIDER: A contractual guarantee of lifetime income — technically a separate guarantee layer on top of the annuity contract. QUALIFIED vs. NON-QUALIFIED: Qualified = funded with pre-tax dollars (IRA, 401k rollover). Non-qualified = funded with after-tax dollars. Tax treatment differs at distribution. Example carrier: Americo (retirement solution)." },
        { title: "Advanced IUL: Death Benefit Options and Loans", content: "DEATH BENEFIT OPTIONS: Option A (Level DB) — total death benefit remains constant (face amount). As cash value grows, net amount at risk decreases. More efficient for cash accumulation. Option B (Increasing DB) — total death benefit equals face amount PLUS accumulated cash value. Higher net amount at risk = higher Cost of Insurance charges = less efficient for cash accumulation but higher death benefit for beneficiaries. LOANS AND ACCESS: Fixed Loans — cash value accessed at a predetermined interest rate. Participating Loans — cash value accessed while continuing to receive index crediting on the loan balance (the leverage definition). Note: if index performs well, you earn on both the retained policy AND the loaned amount. DISTRIBUTION OPTIONS: Policy withdrawals up to cost basis are non-taxable. Distributions via participating loans provide tax-free access to gains. MEC (Modified Endowment Contract): if too much premium is paid too fast, the policy loses tax-free loan treatment — avoid MECs." },
        { title: "FIA vs IUL: Index Comparison", content: "FIA (Fixed Indexed Annuity) vs. IUL (Indexed Universal Life) — key technical differences. FIA: Purpose = retirement income and wealth preservation. NO Cost of Insurance charges. Principal protection + index-linked growth. Qualified funds (IRA/401k rollover) accepted. Designed for distribution phase of retirement planning. IUL: Purpose = permanent life insurance with supplemental retirement income. HAS Cost of Insurance charges (COI) — internal cost of maintaining death benefit. Principal protection + index-linked growth + death benefit. Non-qualified funds typically. Designed for long-term cash accumulation plus death benefit. COMMON INDEX CREDITING METHODS: Annual Point-to-Point (most common), Monthly Sum, Monthly Average. Each method captures index growth differently. Always illustrate multiple crediting methods for clients." },
        { title: "GLWB: Guaranteed Lifetime Withdrawal Benefit", content: "The GLWB is an optional living benefit rider that provides a guaranteed stream of income for life, regardless of market performance. BENEFIT BASE DEFINITION: The value used to calculate the guaranteed payout. This is NOT the same as the account (cash) value — the benefit base can grow even when the account value declines. Example: $100,000 premium with 6% simple rollup = $106,000 benefit base after year 1. WITHDRAWAL PERCENTAGE: Age-based percentage applied to the benefit base to determine annual income. Example: 5% at age 65 × $200,000 benefit base = $10,000/year guaranteed for life. Income continues even if the account value reaches zero. ANNUITIZATION vs. GLWB RIDER: Annuitization is irrevocable — you exchange your contract value for guaranteed payments and lose ownership. A GLWB rider retains client control and ownership while still providing guaranteed income. Key distinction: Income Rider = flexible. Annuitization = irrevocable." },
        { title: "Income Rider vs. Annuitization", content: "INCOME RIDER (flexible): Client retains control and ownership of the contract. Payout is calculated from the Benefit Base, not the account value. Client can stop and restart income, leave remaining value to beneficiaries, and access lump sum in emergencies (subject to surrender charges). ANNUITIZATION (irrevocable): Client exchanges entire contract value for a stream of guaranteed payments. No control, no lump sum access, no beneficiary inheritance after death (with Life Only option). Technically, the payout is calculated using mortality pooling — the carrier pools risk across all annuitants. PAYOUT OPTIONS: Life Only (highest payment, stops at death), Period Certain (guaranteed for a set number of years regardless of death), Joint Life (covers two lifetimes — lower payment but continues for surviving spouse). For most clients, an Income Rider is preferable to annuitization because it preserves control while still guaranteeing lifetime income." },
        { title: "Suitability Requirements", content: "All annuity sales require a documented suitability questionnaire — use the one built into this portal. NAIC suitability factors: (1) Client age — annuities are generally inappropriate for clients over 80. (2) Annual income — annual premium should not exceed 30% of gross annual income for most clients. (3) Liquid assets — annuity should not represent more than 50% of total liquid assets. (4) Financial objectives — income, growth, or legacy? (5) Investment timeline — minimum equal to surrender charge period. (6) Risk tolerance — confirmed understanding of caps, floors, and surrender charges. (7) Existing policies — document why this annuity is in the client's best interest versus existing coverage. The suitability questionnaire is a regulatory requirement — completing it protects both the client AND the agent. Incomplete suitability documentation is the leading cause of annuity-related regulatory complaints." },
        { title: "Annuity Objection Handling", content: "OBJECTION: 'I do not want my money locked up.' RESPONSE: 'I understand — that is actually the most common concern I hear. The good news is that most contracts include a 10% free withdrawal provision every year without penalty. And many include living benefit riders that allow access in specific circumstances like terminal illness. Let me show you exactly what this contract allows.' OBJECTION: 'I already have a CD.' RESPONSE: 'CDs are safe — I respect that. The difference is that a CD gives you a guaranteed rate set by the bank. An FIA gives you protection of principal AND the potential to earn more based on market performance, with a guaranteed floor of zero. Your worst case is the same as a CD. Your best case is better.' OBJECTION: 'What if the insurance company goes out of business?' RESPONSE: 'Great question. All insurance companies are regulated at the state level and backed by state guaranty associations up to $250,000 per contract. That is why A.M. Best carrier ratings matter — we only work with A-rated or better carriers.'" }
      ]
    },
    {
      id: "ancillary_health",
      title: "Supplemental & Ancillary Health",
      icon: "\uD83C\uDFE5",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "Hospital Indemnity: Fixed-Benefit Cash Protection", content: "Hospital Indemnity (HI) pays fixed-amount cash benefits for covered hospital admissions, stays, and services. KEY MECHANISM: Payout logic is triggered by ADMISSION, not by actual expenses. This means the benefit is the same whether the hospital bill is $5,000 or $50,000. Example: $100/day admission benefit = $100 is paid for every day the client is hospitalized, regardless of what the hospital charges. INPATIENT vs. OUTPATIENT DISTINCTION: Inpatient benefits apply to formal hospital admission. Outpatient benefits (if included) apply to ER visits, urgent care, or outpatient procedures. CROSS-SELL OPPORTUNITY: HI is a perfect companion to ACA, Medicare Advantage, and group health plans — all of which have deductibles and out-of-pocket costs that HI cash benefits offset directly." },
        { title: "Critical Illness: The Lump-Sum Trigger", content: "Critical Illness (CI) insurance pays a one-time lump-sum benefit triggered by the FIRST DIAGNOSIS of a specified qualifying condition. PRIMARY TRIGGERS: Cancer (most common), Heart Attack (acute myocardial infarction requiring specified criteria), Stroke (typically requires permanent neurological deficit). SURVIVAL PERIOD DEFINITION: Most CI policies require the client to survive 30 days after diagnosis to receive the benefit. This is a critical disclosure — clients who die within 30 days of diagnosis may not trigger the benefit. FULL vs. PARTIAL BENEFIT: Full benefit paid for primary covered conditions. Partial benefit (e.g., 25%) for less severe conditions like carcinoma in situ. IDEAL CLIENT: Anyone with a family history of cancer, heart disease, or stroke — especially self-employed clients whose income stops when they do. The lump sum can cover treatment costs, replace lost income, or pay off debts." },
        { title: "Accident Expense Insurance", content: "Accident Expense insurance provides fixed-pay or reimbursement benefits specifically for bodily injury due to non-sickness accidents. COVERAGE TRIGGER: Must result from an accidental bodily injury — not illness. EMERGENCY ROOM benefits: Fixed cash payment for ER visits resulting from an accident. URGENT CARE benefits: Lower payment for non-ER urgent care visits. DIAGNOSTIC benefits: X-rays, MRIs, and other diagnostic procedures following an accident. DISMEMBERMENT BENEFIT: Defined cash payment for loss of limbs, sight, hearing, or similar covered losses. ACCIDENTAL DEATH BENEFIT (ADB) INTEGRATION: Some accident policies include an ADB rider that pays an additional death benefit if the insured dies as a direct result of an accident within a specified period (typically 90 days). CROSS-SELL: Accident insurance is an ideal add-on for any client with young children, active lifestyle, or physical occupation." },
        { title: "Dental, Vision and Hearing: The Complete Health Portfolio", content: "DVH coverage defines preventative and corrective service integration for a complete health portfolio. DENTAL: MAJOR services (crowns, bridges, dentures) vs. BASIC services (fillings, extractions) vs. PREVENTIVE (cleanings, x-rays). WAITING PERIODS: Most dental plans have 6-12 month waiting periods for major services. Preventive services are usually immediate. NETWORK: PPO (broader network, cost-sharing outside network) vs. INDEMNITY (pay any dentist, reimbursed at schedule). VISION: Annual eye exam coverage, allowance for frames and lenses or contact lenses. HEARING: Often bundled with vision in DVH packages. Covers hearing evaluations and hearing aid allowances. CROSS-SELL STRATEGY: DVH is an easy yes-add for any client purchasing a major medical policy — most ACA and employer plans have limited dental and vision coverage. Present DVH as the completion of their health portfolio, not as a separate sale." },
        { title: "Cross-Selling Ancillary Products: The Portfolio Approach", content: "The average household needs 3-5 insurance products. Ancillary products are your bridge to a complete client relationship. CROSS-SELL BY ENTRY PRODUCT: Client buys TERM LIFE → add Accident, Critical Illness, Disability. Client buys ACA HEALTH → add Hospital Indemnity, Dental/Vision, Critical Illness. Client buys MEDICARE SUPPLEMENT → add Dental/Vision, Cancer, Life Insurance review. Client buys FINAL EXPENSE → add Hospital Indemnity for living benefit, accidental death. TIMING RULE: Cross-sell after the primary need is addressed. Never pitch ancillary products during the initial sale — it overwhelms and can kill the primary sale. FRAMING: 'Based on what you shared, I noticed there may be a gap in [area]. Would it be helpful if I showed you options? It would take 10 minutes.' TRACKING: Log every cross-sell opportunity identified and the outcome in the CRM — annual reviews are your best cross-sell opportunities." }
      ]
    },
    {
      id: "compliance_essentials",
      title: "Compliance Essentials",
      icon: "\u2705",
      level: "All Agents",
      videoPlaceholder: false,
      lessons: [
        { title: "Carrier Ratings and A.M. Best: Choosing Stable Partners", content: "Carrier financial ratings measure the insurer's ability to pay claims. A.M. BEST RATINGS: A++ (Superior), A+ (Superior), A (Excellent), A- (Excellent), B++ (Good), B+ (Good). Below B+ carries meaningful financial risk. Only recommend carriers rated A- or better. STANDARD and POOR'S (S&P): AAA, AA+, AA, AA-, A+, A, A- are investment grade. MOODY'S: Aaa, Aa1, Aa2, Aa3, A1, A2, A3. SOLVENCY RATIOS: Measure whether the carrier holds enough reserves to pay all projected claims. PRODUCER GUIDE (Rulebook): Each carrier publishes a producer guide defining product availability, underwriting guidelines, compensation schedules, and compliance requirements. Read the producer guide for every new carrier before your first submission." },
        { title: "Underwriting Risk Classes: Health Classification Guide", content: "Underwriting risk classes determine the premium a client pays based on their health profile. PREFERRED PLUS: Excellent health, non-smoker, ideal BMI (typically 18-27), no significant family history. Best available rates. PREFERRED: Good health, minor history (e.g., well-controlled cholesterol). STANDARD PLUS: Some controlled health issues. STANDARD: Controlled chronic conditions (e.g., managed hypertension). TABLE RATINGS (Substandard): B, D, F, H — significant health history. Each table adds a defined percentage to standard premium (Table B = +50%, Table D = +100%, etc.). TOBACCO USER CLASSIFICATION: Separate rate class with substantially higher premiums. Most carriers define tobacco use as any use within 12-36 months. SIMPLIFIED vs. FULL MEDICAL EXAM: Simplified underwriting uses health questions only (Final Expense, some term products). Full underwriting requires medical exam, APS, and may include MIB, MID, and Rx database checks." },
        { title: "Carrier Approval Pipeline: From Application to Issue", content: "The technical path from application submission to policy issuance. SUBMITTED: Application received by carrier. REVIEW: Carrier underwriting team reviews application, runs MIB, Rx, MVR (motor vehicle record for some products), and APS (Attending Physician Statement) if required. IN GOOD ORDER (IGO) CHECK: All required fields completed, all signatures present, all disclosures acknowledged. A Not In Good Order (NIGO) rejection sends the application back — every NIGO delays issue by 5-10 business days minimum. CONDITIONAL APPROVAL: Some applications issued with conditions (e.g., exclusion rider for a pre-existing condition). DECLINE vs. POSTPONE: Decline = ineligible at any rate. Postpone = eligible but must wait (e.g., recent surgery, pending test results). STATE-SPECIFIC VARIATIONS: Application forms, disclosures, and replacement requirements vary by state. Always verify the correct state-specific version before submitting." },
        { title: "E-App Mastery: The Carrier Logic Index", content: "Carrier E-App system by product type: MUTUAL OF OMAHA (FE/Simplified Issue): Access via their agent portal or through our portal link. AETNA (FE/Guaranteed Issue): Direct carrier portal. PROSPERITY (FE/SI): Direct carrier portal. GLOBE LIFE (Term): Direct carrier portal. TRANSAMERICA (IUL/UL): TransACT platform. NEW YORK LIFE (Whole Life): NYL agent portal. FIDELITY (GI/SI): Direct portal. SIGNATURE TYPES: Voice Signature = recorded verbal consent (requires compliance disclosure). Email/Text Link = OTP code authentication, most common for remote sales. Face-to-Face/Click-to-Sign = in-person digital signature. ERROR REDUCTION LOGIC: Mandatory fields must be complete before submission. The E-App system runs real-time validation — mandatory field errors appear immediately. NIGO MINIMIZATION: Pre-submission checklist — verify all signatures, disclosures, beneficiary information, and health question responses before hitting submit." },
        { title: "TCPA and Do Not Call: Your Legal Shield", content: "The Telephone Consumer Protection Act (TCPA) restricts unsolicited calls and text messages. NATIONAL DNC REGISTRY: Calling someone on the National Do Not Call Registry without their written consent can result in fines of $500 per violation (up to $1,500 for willful violations). WRITTEN CONSENT REQUIREMENT: The TCPA consent checkbox on every lead form in this portal is your documented written consent. Every form submission with the consent box checked creates a timestamped legal record. Without that consent, you cannot legally call the number. ROBOCALL/AUTODIALER RESTRICTIONS: Using an autodialer or pre-recorded message without consent is a $500-$1,500 per-call violation. TCPA BEST PRACTICES: Only contact leads who have provided written consent. Document every contact attempt. Never call before 8am or after 9pm local time. Calling a cell phone on the DNC list with an autodialer is a federal violation." },
        { title: "HIPAA and Anti-Churning: Protecting Clients and Your License", content: "HIPAA BASICS: Never share a client's health information with anyone outside the agency without written authorization. Keep client files secure at all times. Do not discuss client health details in public settings. HIPAA violations carry fines up to $50,000 per violation. ANTI-CHURNING RULES: Churning (also called twisting) means replacing a client's existing policy primarily to generate new commissions. This is illegal and can result in license suspension. Every replacement requires documented reasoning: why is the new policy objectively better for the client? Most states require specific replacement forms (Form 1035 for tax-free exchange on life products). ANTI-CHURNING DOCUMENTATION: Complete a needs analysis for every replacement, document the specific client benefit (lower premium, better coverage, improved carrier rating), and retain the documentation for 5 years. If a compliance officer asks why you replaced a policy, your answer must be about the client's benefit." },
        { title: "E&O Insurance and Carrier Contracting", content: "ERRORS AND OMISSIONS (E&O) INSURANCE: E&O protects you and the agency if a client claims your advice or actions caused financial harm. MINIMUM COVERAGE: $1,000,000 per occurrence / $1,000,000 aggregate. Our 365 Financial Solution LLC must be listed as additional insured on your E&O certificate. LAPSED E&O = SUSPENDED SELLING AUTHORITY. Check your E&O expiration date in My Profile. Renew 30 days early — coverage gaps can trigger carrier appointment cancellation. CARRIER CONTRACTING: You must be contracted AND appointed with a carrier before writing any business. CONTRACTED = you have a signed agreement. APPOINTED = the carrier has filed your appointment with the state insurance department. Writing business before appointment is a serious compliance violation. Carrier appointments typically take 5-15 business days. Check appointment status in the carrier portal before quoting — do not submit an application to a carrier where you are not yet appointed." }
      ]
    },
